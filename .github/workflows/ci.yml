name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v --tb=short

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install build twine
      - name: Build wheel and sdist
        run: python -m build
      - name: Check package metadata
        run: twine check dist/*
      - name: Install built wheel in a clean venv
        run: |
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install "$(echo dist/*.whl)[pcap]"
          /tmp/smoke-venv/bin/voipaudit --version
          /tmp/smoke-venv/bin/voipaudit --help

      - name: "Integration test: real commands against a real mock SIP server"
        # Adopted from the very first commit, not discovered later
        # through an audit: no CI job here should ever be able to pass
        # without actually building, installing, and running the real
        # package — this is exactly the gap that let a real,
        # ship-breaking bug (a wrong build-backend in pyproject.toml)
        # go undetected in the sibling loganalyzer repo, found only
        # during a later audit.
        run: |
          set -uo pipefail
          trap 'echo "::error::Integration test failed at line $LINENO: $BASH_COMMAND"' ERR
          set -e
          VA=/tmp/smoke-venv/bin/voipaudit
          WORK=$(mktemp -d)
          cd "$WORK"

          echo "::group::Start a real mock SIP server (real UDP+TCP+TLS sockets)"
          PYTHONPATH="$GITHUB_WORKSPACE" python3 -c "
          import sys, time
          sys.path.insert(0, '$GITHUB_WORKSPACE')
          from tests.fixtures.mock_pbx.server import start_mock_pbx
          server = start_mock_pbx(server_header='Asterisk PBX 18.9.0', accept_unauthenticated_register=True)
          with open('/tmp/mock_pbx_port.txt', 'w') as f:
              f.write(str(server.port))
          with open('/tmp/mock_pbx_tcp_port.txt', 'w') as f:
              f.write(str(server.tcp_port))
          with open('/tmp/mock_pbx_tls_port.txt', 'w') as f:
              f.write(str(server.tls_port))
          time.sleep(90)
          " > /tmp/mock_pbx.log 2>&1 &
          MOCK_PID=$!
          for i in $(seq 1 20); do
            if [ -f /tmp/mock_pbx_port.txt ] && [ -f /tmp/mock_pbx_tcp_port.txt ] && [ -f /tmp/mock_pbx_tls_port.txt ]; then
              break
            fi
            sleep 0.5
          done
          if [ ! -f /tmp/mock_pbx_port.txt ]; then
            echo "::error::Mock PBX never wrote its port file. Log:"
            cat /tmp/mock_pbx.log || true
            exit 1
          fi
          PORT=$(cat /tmp/mock_pbx_port.txt)
          TCP_PORT=$(cat /tmp/mock_pbx_tcp_port.txt)
          TLS_PORT=$(cat /tmp/mock_pbx_tls_port.txt)
          echo "Mock PBX — UDP: $PORT, TCP: $TCP_PORT, TLS: $TLS_PORT (pid $MOCK_PID)"
          echo "::endgroup::"

          echo "::group::init, validate-scope"
          $VA init --output authorization.yml
          # Uses the smoke-venv's own python3, not the bare system one --
          # pyyaml is a dependency of voipaudit itself (installed into
          # the venv), but this job's system interpreter only ever had
          # `pip install build twine` run against it, which doesn't pull
          # in pyyaml as a transitive dependency. The same class of gap
          # already found and fixed in the sibling redteam-toolkit repo's
          # own CI script -- confirmed here for real via the ::error::
          # trap above (line-number annotation), not assumed from that
          # precedent alone.
          /tmp/smoke-venv/bin/python3 -c "
          import datetime, yaml
          now = datetime.datetime.now(datetime.timezone.utc)
          data = {
              'engagement_id': 'ci-integration-test',
              'authorized_by': 'CI', 'authorized_contact_email': 'ci@example.com',
              'client': 'CI Integration Test',
              'scope': {'targets': ['127.0.0.1'], 'excluded_targets': [], 'allowed_categories': ['recon', 'active']},
              'window': {
                  'start': (now - datetime.timedelta(hours=1)).isoformat(),
                  'end': (now + datetime.timedelta(days=1)).isoformat(),
              },
              'confirmation_phrase': 'I confirm authorization for ci-integration-test',
          }
          with open('authorization.yml', 'w') as f:
              yaml.safe_dump(data, f)
          "
          $VA validate-scope
          echo "::endgroup::"

          echo "::group::scan — pbx_fingerprint (recon, real detection)"
          OUTPUT=$($VA scan "127.0.0.1:$PORT" --modules pbx_fingerprint)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Asterisk" || (echo "expected Asterisk fingerprint not found" && exit 1)
          echo "::endgroup::"

          echo "::group::scan — register_exposed refused without --confirm"
          set +e
          $VA scan "127.0.0.1:$PORT" --modules register_exposed
          CODE=$?
          set -e
          if [ "$CODE" -eq 0 ]; then
            echo "register_exposed should have been refused without --confirm"
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::scan — register_exposed with --confirm (real CRITICAL detection)"
          # register_exposed exits 1 when it finds a CRITICAL finding
          # (by design, so a real CI pipeline scanning production VoIP
          # infra can fail on it) — the vulnerable mock PBX is exactly
          # such a case, so THIS exit is expected here, hence || true.
          # Confirmed this matters for real: the same set -e trap
          # already found and fixed in the sibling secureaudit and
          # redteam-toolkit repos' own CI scripts.
          OUTPUT=$($VA scan "127.0.0.1:$PORT" --modules register_exposed --confirm ci-integration-test || true)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "CRITICAL" || (echo "expected CRITICAL finding for the vulnerable mock PBX not found" && exit 1)
          echo "::endgroup::"

          echo "::group::scan — same checks again, over --transport tcp"
          OUTPUT=$($VA scan "127.0.0.1:$TCP_PORT" --modules pbx_fingerprint --transport tcp)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Asterisk" || (echo "expected Asterisk fingerprint over TCP not found" && exit 1)
          OUTPUT=$($VA scan "127.0.0.1:$TCP_PORT" --modules register_exposed --confirm ci-integration-test --transport tcp || true)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "CRITICAL" || (echo "expected CRITICAL finding over TCP not found" && exit 1)
          echo "::endgroup::"

          echo "::group::scan — same checks again, over --transport tls --insecure"
          OUTPUT=$($VA scan "127.0.0.1:$TLS_PORT" --modules pbx_fingerprint --transport tls --insecure)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Asterisk" || (echo "expected Asterisk fingerprint over TLS not found" && exit 1)
          OUTPUT=$($VA scan "127.0.0.1:$TLS_PORT" --modules register_exposed --confirm ci-integration-test --transport tls --insecure || true)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "CRITICAL" || (echo "expected CRITICAL finding over TLS not found" && exit 1)
          echo "::endgroup::"

          echo "::group::scan — transport_security (real cert inspection, real plaintext-alongside-TLS detection)"
          OUTPUT=$($VA scan "127.0.0.1" --modules transport_security --insecure \
            --tls-port "$TLS_PORT" --plaintext-port "$PORT")
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "TLS offered" || (echo "expected 'TLS offered' finding not found" && exit 1)
          echo "$OUTPUT" | grep -q "certificate validity OK" || (echo "expected valid-certificate finding not found" && exit 1)
          echo "$OUTPUT" | grep -q "Plaintext SIP still accepted" || (echo "expected plaintext-alongside-TLS finding not found" && exit 1)
          echo "::endgroup::"

          echo "::group::analyze-cdr — real toll-fraud detection against the real fixture CDR"
          OUTPUT=$($VA analyze-cdr "$GITHUB_WORKSPACE/tests/fixtures/cdr/sample_master.csv" || true)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "high-risk destination" || (echo "expected high-risk-destination finding not found" && exit 1)
          echo "$OUTPUT" | grep -q "Off-hours" || (echo "expected off-hours finding not found" && exit 1)
          echo "$OUTPUT" | grep -q "burst" || (echo "expected burst finding not found" && exit 1)
          echo "::endgroup::"

          echo "::group::analyze-pcap — real SIP call reconstruction from a real synthetic pcap"
          # Uses --json rather than grepping the terminal table: applying
          # the lesson learned in the sibling camara-audit repo's own CI
          # debugging (Rich word-wraps long finding titles across
          # multiple lines depending on terminal width, which differs
          # between an interactive session and CI's piped output) from
          # the start here, not rediscovering it.
          /tmp/smoke-venv/bin/python3 -c "
          import sys, time
          sys.path.insert(0, '$GITHUB_WORKSPACE')
          from scapy.all import IP, UDP, Ether, wrpcap
          base = time.time()
          call_id = 'ci-call@test'
          invite = (
              f'INVITE sip:252611111111@192.168.1.20 SIP/2.0\r\nFrom: <sip:2003@192.168.1.10>;tag=a1\r\n'
              f'To: <sip:252611111111@192.168.1.20>\r\nCall-ID: {call_id}\r\nCSeq: 1 INVITE\r\nContent-Length: 0\r\n\r\n'
          )
          ok = (
              f'SIP/2.0 200 OK\r\nFrom: <sip:2003@192.168.1.10>;tag=a1\r\n'
              f'To: <sip:252611111111@192.168.1.20>;tag=b1\r\nCall-ID: {call_id}\r\nCSeq: 1 INVITE\r\nContent-Length: 0\r\n\r\n'
          )
          def pkt(payload, t_offset, src, dst):
              p = Ether()/IP(src=src, dst=dst)/UDP(sport=5060, dport=5060)/payload.encode()
              p.time = base + t_offset
              return p
          packets = [
              pkt(invite, 0.0, '192.168.1.10', '192.168.1.20'),
              pkt(ok, 3.0, '192.168.1.20', '192.168.1.10'),
          ]
          wrpcap('/tmp/ci_test.pcap', packets)
          print('Real synthetic pcap written: /tmp/ci_test.pcap')
          "
          $VA analyze-pcap /tmp/ci_test.pcap --json /tmp/pcap_findings.json || true
          cat /tmp/pcap_findings.json
          python3 -c "
          import json
          findings = json.load(open('/tmp/pcap_findings.json'))
          assert any(f['severity'] == 'CRITICAL' and '+252' in f['title'] for f in findings), f'expected +252 high-risk-destination finding not found: {findings}'
          print(f'OK: {len(findings)} finding(s), including the expected high-risk destination CRITICAL')
          "
          echo "::endgroup::"

          echo "::group::scan — invite-tier (toll_fraud_exposure), real INVITE against a real mock responder"
          # The most safety-critical feature in this whole toolkit: a
          # real INVITE, immediate CANCEL on the first routing-
          # indicating response. Verifies the full 3-layer
          # authorization escalation (written acknowledgment in
          # authorization.yml -> confirm_active_tier -> confirm_invite_tier)
          # via the real CLI, not just the unit tests already covering
          # Engagement in isolation.
          /tmp/smoke-venv/bin/python3 -c "
          import sys, time
          sys.path.insert(0, '$GITHUB_WORKSPACE')
          from tests.fixtures.mock_pbx.invite_responder import start_mock_invite_responder
          from voipaudit.analyzers.toll_fraud import HIGH_RISK_PREFIXES
          first_prefix = next(iter(HIGH_RISK_PREFIXES))
          server = start_mock_invite_responder(destination_behaviors={first_prefix + '5550100': 'ring_then_silence'})
          with open('/tmp/invite_mock_port.txt', 'w') as f:
              f.write(str(server.port))
          time.sleep(30)
          " > /tmp/invite_mock.log 2>&1 &
          INVITE_MOCK_PID=$!
          for i in $(seq 1 20); do
            if [ -f /tmp/invite_mock_port.txt ]; then break; fi
            sleep 0.5
          done
          INVITE_PORT=$(cat /tmp/invite_mock_port.txt)
          echo "Mock INVITE responder on port $INVITE_PORT"

          /tmp/smoke-venv/bin/python3 -c "
          import datetime, yaml
          from voipaudit.core.authorization import REQUIRED_INVITE_ACKNOWLEDGMENT
          now = datetime.datetime.now(datetime.timezone.utc)
          data = {
              'engagement_id': 'ci-invite-test', 'authorized_by': 'CI', 'authorized_contact_email': 'ci@example.com',
              'client': 'CI Integration Test',
              'scope': {'targets': ['127.0.0.1'], 'excluded_targets': [], 'allowed_categories': ['recon', 'active', 'invite']},
              'window': {
                  'start': (now - datetime.timedelta(hours=1)).isoformat(),
                  'end': (now + datetime.timedelta(days=1)).isoformat(),
              },
              'confirmation_phrase': 'I confirm authorization for ci-invite-test',
              'invite_tier_acknowledgment': REQUIRED_INVITE_ACKNOWLEDGMENT,
          }
          with open('invite_authorization.yml', 'w') as f:
              yaml.safe_dump(data, f)
          "

          # Refused without --confirm at all
          set +e
          $VA scan "127.0.0.1:$INVITE_PORT" --modules toll_fraud_exposure -a invite_authorization.yml
          INVITE_NOCONFIRM_EXIT=$?
          set -e
          if [ "$INVITE_NOCONFIRM_EXIT" -eq 0 ]; then
            echo "::error::toll_fraud_exposure should have been refused without --confirm"
            exit 1
          fi
          echo "Correctly refused without --confirm"

          # Succeeds with --confirm, real CRITICAL finding for the routed destination
          $VA scan "127.0.0.1:$INVITE_PORT" --modules toll_fraud_exposure --confirm ci-invite-test \
            -a invite_authorization.yml --json /tmp/invite_findings.json || true
          cat /tmp/invite_findings.json
          python3 -c "
          import json
          findings = json.load(open('/tmp/invite_findings.json'))
          assert any(f['severity'] == 'CRITICAL' and 'route' in f['title'].lower() for f in findings), f'expected a CRITICAL routing finding not found: {findings}'
          print(f'OK: {len(findings)} finding(s), including the expected CRITICAL routing finding')
          "

          kill $INVITE_MOCK_PID 2>/dev/null || true
          echo "::endgroup::"

          echo "::group::scan — invite-tier (srtp_check), real differential SRTP test against a real mock responder"
          # A separate mock instance configured with the offer-aware
          # 'srtp_only_pbx' behavior -- rejects an SRTP-only offer but
          # answers a plain-RTP offer normally, so this genuinely
          # exercises the differential logic (not just "SRTP always
          # works" or "nothing routes").
          /tmp/smoke-venv/bin/python3 -c "
          import sys, time
          sys.path.insert(0, '$GITHUB_WORKSPACE')
          from tests.fixtures.mock_pbx.invite_responder import start_mock_invite_responder
          server = start_mock_invite_responder(destination_behaviors={'voipaudit-srtp-test': 'srtp_only_pbx'})
          with open('/tmp/srtp_mock_port.txt', 'w') as f:
              f.write(str(server.port))
          time.sleep(30)
          " > /tmp/srtp_mock.log 2>&1 &
          SRTP_MOCK_PID=$!
          for i in $(seq 1 20); do
            if [ -f /tmp/srtp_mock_port.txt ]; then break; fi
            sleep 0.5
          done
          SRTP_PORT=$(cat /tmp/srtp_mock_port.txt)
          echo "Mock SRTP-aware responder on port $SRTP_PORT"

          $VA scan "127.0.0.1:$SRTP_PORT" --modules srtp_check --confirm ci-invite-test \
            -a invite_authorization.yml --json /tmp/srtp_findings.json || true
          cat /tmp/srtp_findings.json
          python3 -c "
          import json
          findings = json.load(open('/tmp/srtp_findings.json'))
          assert any(f['severity'] == 'MEDIUM' and 'not supported' in f['title'].lower() for f in findings), f'expected a MEDIUM SRTP-not-supported finding not found: {findings}'
          print(f'OK: {len(findings)} finding(s), including the expected differential MEDIUM finding')
          "

          kill $SRTP_MOCK_PID 2>/dev/null || true
          echo "::endgroup::"

          echo "::group::analyze-pcap — real TCP stream reassembly (split message across 2 real TCP segments)"
          /tmp/smoke-venv/bin/python3 -c "
          import sys, time
          sys.path.insert(0, '$GITHUB_WORKSPACE')
          from scapy.all import IP, TCP, Ether, wrpcap
          base = time.time()
          call_id = 'ci-tcp-call@test'
          invite = (
              f'INVITE sip:252622222222@192.168.1.20 SIP/2.0\r\nFrom: <sip:2004@192.168.1.10>;tag=a1\r\n'
              f'To: <sip:252622222222@192.168.1.20>\r\nCall-ID: {call_id}\r\nCSeq: 1 INVITE\r\nContent-Length: 0\r\n\r\n'
          ).encode()
          ok = (
              f'SIP/2.0 200 OK\r\nFrom: <sip:2004@192.168.1.10>;tag=a1\r\n'
              f'To: <sip:252622222222@192.168.1.20>;tag=b1\r\nCall-ID: {call_id}\r\nCSeq: 1 INVITE\r\nContent-Length: 0\r\n\r\n'
          ).encode()
          split = len(invite) // 2
          part1, part2 = invite[:split], invite[split:]
          def tcp_pkt(payload, seq, t_offset, src, dst):
              p = Ether()/IP(src=src, dst=dst)/TCP(sport=5060, dport=5060, seq=seq)/payload
              p.time = base + t_offset
              return p
          packets = [
              tcp_pkt(part1, 1000, 0.0, '192.168.1.10', '192.168.1.20'),
              tcp_pkt(part2, 1000 + len(part1), 0.02, '192.168.1.10', '192.168.1.20'),
              tcp_pkt(ok, 5000, 0.1, '192.168.1.20', '192.168.1.10'),
          ]
          wrpcap('/tmp/ci_tcp_test.pcap', packets)
          print('Real synthetic TCP pcap written (INVITE split across 2 real TCP segments)')
          "
          $VA analyze-pcap /tmp/ci_tcp_test.pcap --json /tmp/tcp_pcap_findings.json || true
          cat /tmp/tcp_pcap_findings.json
          python3 -c "
          import json
          findings = json.load(open('/tmp/tcp_pcap_findings.json'))
          assert any(f['severity'] == 'CRITICAL' and '+252' in f['title'] for f in findings), f'expected +252 finding from the TCP-reassembled call not found: {findings}'
          print(f'OK: {len(findings)} finding(s), the TCP-split INVITE was correctly reassembled and analyzed')
          "
          echo "::endgroup::"

          echo "::group::scan — invite-tier over --transport tcp, real INVITE against the mock responder's TCP listener"
          /tmp/smoke-venv/bin/python3 -c "
          import sys, time
          sys.path.insert(0, '$GITHUB_WORKSPACE')
          from tests.fixtures.mock_pbx.invite_responder import start_mock_invite_responder
          from voipaudit.analyzers.toll_fraud import HIGH_RISK_PREFIXES
          first_prefix = next(iter(HIGH_RISK_PREFIXES))
          server = start_mock_invite_responder(destination_behaviors={first_prefix + '5550100': 'ring_then_silence'})
          with open('/tmp/tcp_invite_mock_port.txt', 'w') as f:
              f.write(str(server.tcp_port))
          time.sleep(30)
          " > /tmp/tcp_invite_mock.log 2>&1 &
          TCP_INVITE_MOCK_PID=$!
          for i in $(seq 1 20); do
            if [ -f /tmp/tcp_invite_mock_port.txt ]; then break; fi
            sleep 0.5
          done
          TCP_INVITE_PORT=$(cat /tmp/tcp_invite_mock_port.txt)
          echo "Mock INVITE responder TCP port: $TCP_INVITE_PORT"

          $VA scan "127.0.0.1:$TCP_INVITE_PORT" --modules toll_fraud_exposure --transport tcp \
            --confirm ci-invite-test -a invite_authorization.yml --json /tmp/tcp_invite_findings.json || true
          cat /tmp/tcp_invite_findings.json
          python3 -c "
          import json
          findings = json.load(open('/tmp/tcp_invite_findings.json'))
          assert any(f['severity'] == 'CRITICAL' and 'route' in f['title'].lower() for f in findings), f'expected a CRITICAL routing finding over TCP not found: {findings}'
          print(f'OK: {len(findings)} finding(s), including the expected CRITICAL routing finding over TCP')
          "

          kill $TCP_INVITE_MOCK_PID 2>/dev/null || true
          echo "::endgroup::"

          echo "::group::scan — invite-tier over --transport tls --insecure, real INVITE against the mock responder's TLS listener"
          /tmp/smoke-venv/bin/python3 -c "
          import sys, time
          sys.path.insert(0, '$GITHUB_WORKSPACE')
          from tests.fixtures.mock_pbx.invite_responder import start_mock_invite_responder
          from voipaudit.analyzers.toll_fraud import HIGH_RISK_PREFIXES
          first_prefix = next(iter(HIGH_RISK_PREFIXES))
          server = start_mock_invite_responder(destination_behaviors={first_prefix + '5550100': 'ring_then_silence'})
          with open('/tmp/tls_invite_mock_port.txt', 'w') as f:
              f.write(str(server.tls_port))
          time.sleep(30)
          " > /tmp/tls_invite_mock.log 2>&1 &
          TLS_INVITE_MOCK_PID=$!
          for i in $(seq 1 20); do
            if [ -f /tmp/tls_invite_mock_port.txt ]; then break; fi
            sleep 0.5
          done
          TLS_INVITE_PORT=$(cat /tmp/tls_invite_mock_port.txt)
          echo "Mock INVITE responder TLS port: $TLS_INVITE_PORT"

          $VA scan "127.0.0.1:$TLS_INVITE_PORT" --modules toll_fraud_exposure --transport tls --insecure \
            --confirm ci-invite-test -a invite_authorization.yml --json /tmp/tls_invite_findings.json || true
          cat /tmp/tls_invite_findings.json
          python3 -c "
          import json
          findings = json.load(open('/tmp/tls_invite_findings.json'))
          assert any(f['severity'] == 'CRITICAL' and 'route' in f['title'].lower() for f in findings), f'expected a CRITICAL routing finding over TLS not found: {findings}'
          print(f'OK: {len(findings)} finding(s), including the expected CRITICAL routing finding over TLS')
          "

          kill $TLS_INVITE_MOCK_PID 2>/dev/null || true
          echo "::endgroup::"

          echo "::group::analyze-pcap — TLS 1.2 decryption via --tls-keylog, real decrypted SIP call reconstruction"
          # Reuses tests/fixtures/mock_pbx/tls_pcap.py's real TLS 1.2
          # client/server session capture (same helper the unit tests
          # in tests/test_pcap_tls.py exercise) -- a real handshake,
          # real AEAD-encrypted SIP traffic, and a real SSLKEYLOGFILE,
          # not a hand-approximated ciphertext.
          /tmp/smoke-venv/bin/python3 -c "
          import sys
          sys.path.insert(0, '$GITHUB_WORKSPACE')
          from pathlib import Path
          from tests.fixtures.mock_pbx.tls_pcap import capture_tls12_pcap
          call_id = 'ci-tls-call@test'
          invite = (
              f'INVITE sip:252633333333@192.168.1.20 SIP/2.0\r\nFrom: <sip:2005@192.168.1.10>;tag=a1\r\n'
              f'To: <sip:252633333333@192.168.1.20>\r\nCall-ID: {call_id}\r\nCSeq: 1 INVITE\r\nContent-Length: 0\r\n\r\n'
          ).encode()
          ok = (
              f'SIP/2.0 200 OK\r\nFrom: <sip:2005@192.168.1.10>;tag=a1\r\n'
              f'To: <sip:252633333333@192.168.1.20>;tag=b1\r\nCall-ID: {call_id}\r\nCSeq: 1 INVITE\r\nContent-Length: 0\r\n\r\n'
          ).encode()
          pcap_path, keylog_path = capture_tls12_pcap(Path('/tmp/ci_tls_pcap'), [(invite, ok)])
          print(f'pcap={pcap_path} keylog={keylog_path}')
          with open('/tmp/ci_tls_pcap_paths.txt', 'w') as f:
              f.write(f'{pcap_path}\n{keylog_path}\n')
          "
          PCAP_PATH=$(sed -n '1p' /tmp/ci_tls_pcap_paths.txt)
          KEYLOG_PATH=$(sed -n '2p' /tmp/ci_tls_pcap_paths.txt)
          $VA analyze-pcap "$PCAP_PATH" --tls-keylog "$KEYLOG_PATH" --json /tmp/tls_pcap_findings.json || true
          cat /tmp/tls_pcap_findings.json
          python3 -c "
          import json
          findings = json.load(open('/tmp/tls_pcap_findings.json'))
          assert any(f['severity'] == 'CRITICAL' and '+252' in f['title'] for f in findings), f'expected +252 finding from the TLS-decrypted call not found: {findings}'
          print(f'OK: {len(findings)} finding(s), the TLS-decrypted call was correctly reconstructed and analyzed')
          "
          echo "::endgroup::"

          echo "::group::scan — caller_id_spoofing, real differential test against the identity-aware mock responder"
          /tmp/smoke-venv/bin/python3 -c "
          import sys, time
          sys.path.insert(0, '$GITHUB_WORKSPACE')
          from tests.fixtures.mock_pbx.invite_responder import start_mock_invite_responder
          server = start_mock_invite_responder(destination_behaviors={'voipaudit-spoof-test': 'reject_self_spoofed_identity'})
          with open('/tmp/spoof_mock_port.txt', 'w') as f:
              f.write(str(server.port))
          time.sleep(30)
          " > /tmp/spoof_mock.log 2>&1 &
          SPOOF_MOCK_PID=$!
          for i in $(seq 1 20); do
            if [ -f /tmp/spoof_mock_port.txt ]; then break; fi
            sleep 0.5
          done
          SPOOF_PORT=$(cat /tmp/spoof_mock_port.txt)
          echo "Mock identity-aware responder on port $SPOOF_PORT"

          $VA scan "127.0.0.1:$SPOOF_PORT" --modules caller_id_spoofing --confirm ci-invite-test \
            -a invite_authorization.yml --json /tmp/spoof_findings.json || true
          cat /tmp/spoof_findings.json
          python3 -c "
          import json
          findings = json.load(open('/tmp/spoof_findings.json'))
          assert any(f['severity'] == 'INFO' and 'differently' in f['title'].lower() for f in findings), f'expected an INFO differentiated-handling finding not found: {findings}'
          print(f'OK: {len(findings)} finding(s), including the expected differentiated-handling finding')
          "

          kill $SPOOF_MOCK_PID 2>/dev/null || true
          echo "::endgroup::"

          echo "::group::scan — refer_transfer_abuse, real REFER/NOTIFY exchange against the mock responder"
          /tmp/smoke-venv/bin/python3 -c "
          import sys, time
          sys.path.insert(0, '$GITHUB_WORKSPACE')
          from tests.fixtures.mock_pbx.invite_responder import start_mock_invite_responder
          server = start_mock_invite_responder(destination_behaviors={'voipaudit-transfer-test': 'answer_then_refer_accepted'})
          with open('/tmp/transfer_mock_port.txt', 'w') as f:
              f.write(str(server.port))
          time.sleep(30)
          " > /tmp/transfer_mock.log 2>&1 &
          TRANSFER_MOCK_PID=$!
          for i in $(seq 1 20); do
            if [ -f /tmp/transfer_mock_port.txt ]; then break; fi
            sleep 0.5
          done
          TRANSFER_PORT=$(cat /tmp/transfer_mock_port.txt)
          echo "Mock REFER-accepting responder on port $TRANSFER_PORT"

          $VA scan "127.0.0.1:$TRANSFER_PORT" --modules refer_transfer_abuse --confirm ci-invite-test \
            -a invite_authorization.yml --json /tmp/transfer_findings.json || true
          cat /tmp/transfer_findings.json
          python3 -c "
          import json
          findings = json.load(open('/tmp/transfer_findings.json'))
          assert any(f['severity'] == 'HIGH' and 'honor' in f['title'].lower() for f in findings), f'expected a HIGH honored-transfer finding not found: {findings}'
          print(f'OK: {len(findings)} finding(s), including the expected HIGH honored-transfer finding')
          "

          kill $TRANSFER_MOCK_PID 2>/dev/null || true
          echo "::endgroup::"

          echo "::group::scan — refer_transfer_abuse --confirm-transfer-reachable, real observed callback INVITE"
          # Uses answer_then_honor_transfer, which -- unlike
          # answer_then_refer_accepted above -- actually places a real
          # new INVITE toward whatever Refer-To names, exactly like a
          # real target that genuinely honors transfers would.
          /tmp/smoke-venv/bin/python3 -c "
          import sys, time
          sys.path.insert(0, '$GITHUB_WORKSPACE')
          from tests.fixtures.mock_pbx.invite_responder import start_mock_invite_responder
          server = start_mock_invite_responder(destination_behaviors={'voipaudit-transfer-test': 'answer_then_honor_transfer'})
          with open('/tmp/confirm_mock_port.txt', 'w') as f:
              f.write(str(server.port))
          time.sleep(30)
          " > /tmp/confirm_mock.log 2>&1 &
          CONFIRM_MOCK_PID=$!
          for i in $(seq 1 20); do
            if [ -f /tmp/confirm_mock_port.txt ]; then break; fi
            sleep 0.5
          done
          CONFIRM_PORT=$(cat /tmp/confirm_mock_port.txt)
          echo "Mock transfer-honoring responder on port $CONFIRM_PORT"

          $VA scan "127.0.0.1:$CONFIRM_PORT" --modules refer_transfer_abuse --confirm ci-invite-test \
            -a invite_authorization.yml --confirm-transfer-reachable --callback-host 127.0.0.1 \
            --json /tmp/confirm_findings.json || true
          cat /tmp/confirm_findings.json
          python3 -c "
          import json
          findings = json.load(open('/tmp/confirm_findings.json'))
          assert any(f['severity'] == 'CRITICAL' and 'confirmed' in f['title'].lower() for f in findings), f'expected a CRITICAL confirmed-callback finding not found: {findings}'
          print(f'OK: {len(findings)} finding(s), including the expected CRITICAL confirmed-callback finding')
          "

          kill $CONFIRM_MOCK_PID 2>/dev/null || true
          echo "::endgroup::"

          echo "::group::scan --db, then dashboard — real SQLite persistence + a real HTTP request against the served page"
          # A dedicated, fresh mock PBX for this section rather than
          # reusing the original $PORT from much earlier in this script
          # -- that one only lives 90s from its own startup, and by this
          # point in a long-running job it may well have already exited.
          /tmp/smoke-venv/bin/python3 -c "
          import sys, time
          sys.path.insert(0, '$GITHUB_WORKSPACE')
          from tests.fixtures.mock_pbx.server import start_mock_pbx
          server = start_mock_pbx(server_header='Asterisk PBX 18.9.0')
          with open('/tmp/db_mock_port.txt', 'w') as f:
              f.write(str(server.port))
          time.sleep(30)
          " > /tmp/db_mock.log 2>&1 &
          DB_MOCK_PID=$!
          for i in $(seq 1 20); do
            if [ -f /tmp/db_mock_port.txt ]; then break; fi
            sleep 0.5
          done
          DB_MOCK_PORT=$(cat /tmp/db_mock_port.txt)
          echo "Mock PBX for --db test on port $DB_MOCK_PORT"

          /tmp/smoke-venv/bin/pip install --quiet "$(echo dist/*.whl)[dashboard]"
          DB_PATH=$(mktemp -u --suffix=.db)
          $VA scan "127.0.0.1:$DB_MOCK_PORT" --modules pbx_fingerprint --db "$DB_PATH"
          python3 -c "
          import sqlite3
          conn = sqlite3.connect('$DB_PATH')
          runs = conn.execute('SELECT * FROM runs').fetchall()
          findings = conn.execute('SELECT * FROM findings').fetchall()
          assert len(runs) == 1, f'expected 1 run, got {runs}'
          assert len(findings) >= 1, f'expected at least 1 finding, got {findings}'
          print(f'OK: {len(runs)} run(s), {len(findings)} finding(s) persisted to {\"$DB_PATH\"}')
          "

          $VA dashboard --db "$DB_PATH" --port 8123 > /tmp/dashboard.log 2>&1 &
          DASHBOARD_PID=$!
          for i in $(seq 1 20); do
            if curl -s -o /dev/null "http://127.0.0.1:8123/"; then break; fi
            sleep 0.5
          done
          INDEX_BODY=$(curl -s "http://127.0.0.1:8123/")
          echo "$INDEX_BODY" | grep -q "ci-integration-test" || (echo "::error::expected engagement_id not found in dashboard index" && cat /tmp/dashboard.log && exit 1)
          RUN_DETAIL=$(curl -s "http://127.0.0.1:8123/runs/1")
          echo "$RUN_DETAIL" | grep -qi "asterisk" || (echo "::error::expected finding not found in run detail page" && exit 1)
          API_RUNS=$(curl -s "http://127.0.0.1:8123/api/runs")
          echo "$API_RUNS" | python3 -c "import json,sys; data=json.load(sys.stdin); assert len(data) == 1, data; print('OK: /api/runs returned', data)"
          kill $DASHBOARD_PID 2>/dev/null || true
          echo "::endgroup::"

          kill $MOCK_PID 2>/dev/null || true
          echo "All integration checks passed."
